<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบหลังบ้าน - ส่งงานครูเกมส์</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    .hw-card { background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.04); border-radius: 20px; box-shadow: 0 4px 20px rgba(30,64,175,0.05); }
    .hw-input { background: rgba(118,118,128,0.06); border: none; border-radius: 12px; padding: 10px 14px; font-size: 14px; width: 100%; transition: all 0.2s; }
    .hw-input:focus { background: rgba(118,118,128,0.12); box-shadow: 0 0 0 2px rgba(30, 64, 175, 0.2); outline: none; }
    .hw-list-item { background: #fff; padding: 12px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.04); }
    .hw-list-item:first-child { border-radius: 16px 16px 0 0; }
    .hw-list-item:last-child { border-radius: 0 0 16px 16px; border-bottom: none; }
    .hw-segment { background: rgba(255,255,255,0.6); border-radius: 12px; padding: 4px; display: flex; }
    .hw-tab-btn { flex: 1; border-radius: 9px; padding: 10px 12px; font-size: 13px; font-weight: 500; color: #666; border: none; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: 0.2s;}
    .hw-tab-btn.active { background: #fff; box-shadow: 0 2px 8px rgba(30,64,175,0.08); color: #1E40AF; font-weight: 600; }
    
    /* ยกเลิกคลาสimg-fade-radial ของเดิมออกทั้งหมด */
  </style>
</head>
<body class="min-h-screen bg-[#E6F2FB] text-gray-800">
  
  <header class="pt-8 pb-6 px-5 max-w-lg mx-auto flex flex-col items-center text-center gap-0">
    <img src="เกมส์_01.png" alt="โลโก้ครูเกมส์" class="w-36 h-36 object-cover drop-shadow-md" onerror="this.style.display='none'">
    <div class="-mt-6 z-10">
      <h1 class="font-bold text-xl leading-tight text-gray-900 drop-shadow-sm">ระบบจัดการหลังบ้าน</h1>
      <p class="text-xs mt-1 text-blue-700 bg-white px-3 py-1 rounded-full inline-block font-medium shadow-sm">แผงควบคุมสำหรับครูเกมส์</p>
    </div>
  </header>

  <nav class="max-w-lg mx-auto px-5 mb-5">
    <div class="hw-segment flex">
      <button class="hw-tab-btn active" data-tab="report"><i data-lucide="bar-chart-3" style="width:16px;height:16px;"></i> การส่งงาน</button> 
      <button class="hw-tab-btn" data-tab="manage-assignments"><i data-lucide="clipboard-list" style="width:16px;height:16px;"></i> ชิ้นงาน</button> 
      <button class="hw-tab-btn" data-tab="manage-students"><i data-lucide="users" style="width:16px;height:16px;"></i> นักเรียน</button>
    </div>
  </nav>

  <main class="max-w-lg mx-auto px-5 pb-10">
    <section id="tab-report">
      <div class="flex gap-2 mb-4">
        <select id="filter-classroom" class="hw-input flex-1 bg-white shadow-sm"><option value="">ทุกห้อง</option></select> 
        <select id="filter-assignment" class="hw-input flex-1 bg-white shadow-sm"><option value="">ทุกงาน</option></select>
      </div>
      <div id="report-content" class="space-y-4">กำลังโหลดข้อมูล...</div>
    </section>

    <section id="tab-manage-assignments" class="hidden">
      <div class="hw-card p-5 space-y-4 bg-white mb-4">
        <h3 class="font-bold text-gray-800 flex items-center gap-2"><i data-lucide="plus-circle" class="text-blue-500"></i> เพิ่มงานใหม่</h3>
        <div class="flex gap-2">
          <input id="new-assignment" type="text" class="hw-input flex-1" placeholder="พิมพ์ชื่องาน..."> 
          <button id="add-assignment-btn" class="bg-blue-500 text-white px-5 rounded-xl text-xs font-semibold hover:bg-blue-600 transition">เพิ่ม</button>
        </div>
      </div>
      <div id="assignment-list" class="rounded-2xl overflow-hidden shadow-sm border border-gray-100"></div>
    </section>

    <section id="tab-manage-students" class="hidden">
      <div class="hw-card p-5 space-y-4 bg-white mb-4">
        <h3 class="font-bold text-gray-800 flex items-center gap-2"><i data-lucide="user-plus" class="text-green-500"></i> เพิ่มห้อง/นักเรียน</h3>
        <p class="text-xs text-gray-500">*ใส่เฉพาะชื่อห้องเพื่อสร้างห้องเรียนใหม่ได้</p>
        <div class="flex gap-2">
          <input id="new-student" type="text" class="hw-input flex-1" placeholder="ชื่อ-สกุล (เว้นว่างได้)"> 
          <input id="new-student-class" type="text" class="hw-input w-24" placeholder="เช่น ม.3/7"> 
          <button id="add-student-btn" class="bg-green-500 text-white px-4 rounded-xl text-xs font-semibold hover:bg-green-600 transition">เพิ่ม</button>
        </div>
      </div>
      <div id="student-list" class="rounded-2xl overflow-hidden shadow-sm border border-gray-100"></div>
    </section>
  </main>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3CvKgcXVrTSxk8aWvgAJghoZ_EdKIxYwvt7BstBblcv1xwaCt2-c-4HAtOvUPYG7k8g/exec';

    let allSubmissions = []; let allAssignments = []; let allStudents = [];

    async function loadAllData() {
      lucide.createIcons();
      document.getElementById('report-content').innerHTML = 'กำลังโหลดข้อมูล...';
      try {
        const response = await fetch(SCRIPT_URL); 
        const data = await response.json();
        allSubmissions = data.filter(d => d.type === 'submission');
        allAssignments = data.filter(d => d.type === 'assignment');
        allStudents = data.filter(d => d.type === 'student');
        
        const classrooms = [...new Set(allStudents.map(s => s.classroom).filter(c => c && c.trim() !== ''))].sort();
        document.getElementById('filter-classroom').innerHTML = '<option value="">ทุกห้อง</option>' + classrooms.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('filter-assignment').innerHTML = '<option value="">ทุกงาน</option>' + allAssignments.map(a => `<option value="${a.name}">${a.name}</option>`).join('');

        renderReport(); renderAssignmentList(); renderStudentList();
      } catch(e) { document.getElementById('report-content').innerHTML = '<p class="text-red-500 text-center">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>'; }
    }

    function renderReport() {
      const fc = document.getElementById('filter-classroom').value; 
      const fa = document.getElementById('filter-assignment').value;
      let filtered = allSubmissions.filter(d => (!fc || d.classroom === fc) && (!fa || d.assignment === fa));
      filtered.reverse();

      const container = document.getElementById('report-content');
      if (filtered.length === 0) { container.innerHTML = '<p class="text-center py-6 text-gray-400 text-sm">ยังไม่มีข้อมูลการส่งงาน</p>'; return; }

      container.innerHTML = filtered.map(item => `
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 text-sm space-y-2 hw-card">
          <div class="flex justify-between items-start gap-2 font-bold">
            <span class="text-gray-900 leading-snug">
              <span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded-md text-xs mr-1">เลขที่ ${item.student_number}</span> 
              ${item.student_name} <span class="text-gray-500 font-normal">(${item.classroom})</span>
            </span>
            <span class="text-blue-600 text-right whitespace-nowrap">${item.assignment}</span>
          </div>
          <div class="text-gray-400 text-xs flex items-center gap-1.5"><i data-lucide="calendar" style="width:12px;height:12px;"></i> ${item.submitted_date}</div>
          ${item.link ? `<div class="text-xs flex items-center gap-1.5"><i data-lucide="link" style="width:12px;height:12px;"></i> <a href="${item.link}" target="_blank" class="text-blue-500 underline break-all">${item.link}</a></div>` : ''}
          ${item.file_url ? `<div class="mt-2"><a href="${item.file_url}" target="_blank" class="text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-xl inline-flex items-center gap-1.5 font-medium transition text-xs whitespace-nowrap"><i data-lucide="file-text" style="width:14px;height:14px;"></i> เปิดไฟล์แนบ</a></div>` : ''}
        </div>`).join('');
      lucide.createIcons();
    }

    function renderAssignmentList() { 
      const container = document.getElementById('assignment-list'); 
      if(allAssignments.length === 0) { container.innerHTML = '<div class="p-4 text-center text-gray-400 text-sm bg-white">ไม่มีข้อมูลชิ้นงาน</div>'; return; } 
      container.innerHTML = allAssignments.map(a => `<div class="hw-list-item flex justify-between items-center"><span class="text-sm font-medium text-gray-900">${a.name}</span><button onclick="removeItem('assignments', '${a.id}')" class="text-red-500 text-xs font-semibold px-2 py-1 bg-red-50 rounded-lg flex items-center gap-1"><i data-lucide="trash-2" style="width:14px;height:14px;"></i> ลบ</button></div>`).join(''); lucide.createIcons(); 
    }
    
    function renderStudentList() { 
      const container = document.getElementById('student-list'); 
      if(allStudents.length === 0) { container.innerHTML = '<div class="p-4 text-center text-gray-400 text-sm bg-white">ไม่มีข้อมูลนักเรียน</div>'; return; } 
      container.innerHTML = allStudents.map(s => `<div class="hw-list-item flex justify-between items-center"><span class="text-sm font-medium text-gray-900">${s.name || '<span class="text-gray-400">(ไม่มีชื่อ)</span>'} <span class="text-xs text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full ml-2">${s.classroom}</span></span><button onclick="removeItem('students', '${s.id}')" class="text-red-500 text-xs font-semibold px-2 py-1 bg-red-50 rounded-lg flex items-center gap-1"><i data-lucide="trash-2" style="width:14px;height:14px;"></i> ลบ</button></div>`).join(''); lucide.createIcons(); 
    }
    
    window.removeItem = async function(type, id) { 
      if(!id || id === 'undefined') return; 
      if(confirm('ยืนยันการลบข้อมูลนี้หรือไม่?')) { 
        try { 
          await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', type: type, id: id }) }); 
          loadAllData(); 
        } catch(e) { alert('ไม่สามารถลบได้'); } 
      } 
    };

    document.getElementById('add-assignment-btn').addEventListener('click', async () => { 
      const input = document.getElementById('new-assignment'); 
      if (!input.value.trim()) return; 
      const btn = document.getElementById('add-assignment-btn'); btn.disabled = true; btn.innerText = '..';
      try { 
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'create', record: { type: 'assignment', name: input.value.trim() } }) }); 
        input.value = ''; loadAllData(); 
      } catch(e) {} 
      btn.disabled = false; btn.innerText = 'เพิ่ม';
    });

    document.getElementById('add-student-btn').addEventListener('click', async () => { 
      const nameEl = document.getElementById('new-student'); const classEl = document.getElementById('new-student-class'); 
      if (!classEl.value.trim()) return alert("กรุณาใส่ชื่อห้องเรียนด้วยครับ"); 
      const btn = document.getElementById('add-student-btn'); btn.disabled = true; btn.innerText = '..';
      try { 
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'create', record: { type: 'student', name: nameEl.value.trim(), classroom: classEl.value.trim() } }) }); 
        nameEl.value = ''; loadAllData(); 
      } catch(e) {} 
      btn.disabled = false; btn.innerText = 'เพิ่ม';
    });

    document.querySelectorAll('.hw-segment button').forEach(btn => { 
      btn.addEventListener('click', () => { 
        document.querySelectorAll('.hw-segment button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); 
        ['report','manage-assignments','manage-students'].forEach(t => document.getElementById('tab-' + t).classList.add('hidden')); 
        document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden'); 
      }); 
    });

    document.getElementById('filter-classroom').addEventListener('change', renderReport); 
    document.getElementById('filter-assignment').addEventListener('change', renderReport);
    
    window.onload = loadAllData;
  </script>
</body>
</html>
