<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังบ้านครู - โรงเรียนจอมสุรางค์อุปถัมภ์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .nav-tabs .nav-link.active { background-color: #0d6efd; color: white; border-color: #0d6efd; }
    </style>
</head>
<body>
<div class="container my-5">
    <h2 class="mb-4 text-center text-dark">📊 ระบบจัดการข้อมูลหลังบ้านครู</h2>
    
    <ul class="nav nav-tabs mb-4" id="adminTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" id="sub-tab" data-bs-toggle="tab" data-bs-target="#sub-panel">ประวัติการส่งงาน</button></li>
        <li class="nav-item"><button class="nav-link" id="asg-tab" data-bs-toggle="tab" data-bs-target="#asg-panel">จัดการชื่องาน</button></li>
        <li class="nav-item"><button class="nav-link" id="std-tab" data-bs-toggle="tab" data-bs-target="#std-panel">จัดการรายชื่อนักเรียน</button></li>
    </ul>

    <div class="tab-content bg-white p-4 border rounded shadow-sm">
        <div class="tab-pane fade show active" id="sub-panel">
            <h4>รายการส่งงานของนักเรียน</h4>
            <div class="table-responsive mt-3">
                <table class="table table-striped table-bordered align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>วันเวลาที่ส่ง</th><th>ห้อง</th><th>เลขที่</th><th>ชื่อ-สกุล</th><th>งานที่ส่ง</th><th>ลิงก์ผลงาน</th><th>ไฟล์ใน Drive</th>
                        </tr>
                    </thead>
                    <tbody id="subTableBody"><tr><td colspan="7" class="text-center text-muted">กำลังโหลดข้อมูล...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="asg-panel">
            <h4>เพิ่มภาระงาน/ชิ้นงานใหม่</h4>
            <form id="addAsgForm" class="row g-3 my-2">
                <div class="col-sm-9"><input type="text" class="form-control" id="asgName" placeholder="เช่น ใบงานที่ 1 เรื่อง เทคโนโลยี" required></div>
                <div class="col-sm-3"><button type="submit" class="btn btn-success w-100">➕ เพิ่มภาระงาน</button></div>
            </form>
            <table class="table table-bordered mt-3"><thead class="table-light"><tr><th>ชื่องาน</th><th width="10%">จัดการ</th></tr></thead><tbody id="asgTableBody"></tbody></table>
        </div>

        <div class="tab-pane fade" id="std-panel">
            <h4>เพิ่มรายชื่อนักเรียนเข้าระบบ</h4>
            <form id="addStdForm" class="row g-3 my-2">
                <div class="col-sm-5"><input type="text" class="form-control" id="stdName" placeholder="ชื่อ - นามสกุล" required></div>
                <div class="col-sm-4"><input type="text" class="form-control" id="stdClass" placeholder="เช่น ม.1/1" required></div>
                <div class="col-sm-3"><button type="submit" class="btn btn-success w-100">➕ เพิ่มนักเรียน</button></div>
            </form>
            <table class="table table-bordered mt-3"><thead class="table-light"><tr><th>ชื่อ-นามสกุล</th><th>ห้องเรียน</th><th width="10%">จัดการ</th></tr></thead><tbody id="stdTableBody"></tbody></table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ⚠️ นำ URL Web App ล่าสุดมาใส่ที่นี่เช่นกัน
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyrGfnkhLu9vYgOy67Tj4UWk1eDryHZI1mLzxGwT880fwK-1oLdnDRH8K4csT229SAa/exec';

    function loadAllData() {
        fetch(WEB_APP_URL)
        .then(res => res.json())
        .then(data => {
            const subBody = document.getElementById('subTableBody');
            const asgBody = document.getElementById('asgTableBody');
            const stdBody = document.getElementById('stdTableBody');
            
            subBody.innerHTML = ''; asgBody.innerHTML = ''; stdBody.innerHTML = '';

            let hasSub = false;
            data.forEach(item => {
                if(item.type === 'submission') {
                    hasSub = true;
                    subBody.innerHTML += `<tr>
                        <td>${item.submitted_date}</td><td>${item.classroom}</td><td>${item.student_number}</td><td>${item.student_name}</td><td>${item.assignment}</td>
                        <td>${item.link ? `<a href="${item.link}" target="_blank" class="btn btn-sm btn-outline-primary">เปิดลิงก์</a>` : '-'}</td>
                        <td>${item.file_url ? `<a href="${item.file_url}" target="_blank" class="btn btn-sm btn-info text-white">เปิดดูรูป</a>` : '-'}</td>
                    </tr>`;
                } else if(item.type === 'assignment') {
                    asgBody.innerHTML += `<tr><td>${item.name}</td><td><button class="btn btn-danger btn-sm" onclick="deleteItem('assignments', '${item.id}')">ลบ</button></td></tr>`;
                } else if(item.type === 'student') {
                    stdBody.innerHTML += `<tr><td>${item.name}</td><td>${item.classroom}</td><td><button class="btn btn-danger btn-sm" onclick="deleteItem('students', '${item.id}')">ลบ</button></td></tr>`;
                }
            });
            if(!hasSub) subBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">ยังไม่มีประวัติการส่งงาน</td></tr>';
        }).catch(err => alert("โหลดข้อมูลล้มเหลว"));
    }

    // เพิ่มภาระงาน
    document.getElementById('addAsgForm').addEventListener('submit', function(e) {
        e.preventDefault();
        sendCreate({ type: 'assignment', name: document.getElementById('asgName').value });
    });

    // เพิ่มรายชื่อนักเรียน
    document.getElementById('addStdForm').addEventListener('submit', function(e) {
        e.preventDefault();
        sendCreate({ type: 'student', name: document.getElementById('stdName').value, classroom: document.getElementById('stdClass').value });
    });

    function sendCreate(record) {
        fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'create', record: record }) })
        .then(res => res.json()).then(res => { if(res.isOk) { alert("บันทึกข้อมูลเรียบร้อย!"); loadAllData(); document.getElementById('addAsgForm').reset(); document.getElementById('addStdForm').reset(); } else { alert("เกิดข้อผิดพลาด"); } });
    }

    function deleteItem(type, id) {
        if(!confirm("ยืนยันการลบแถวข้อมูลนี้? (การลบในแถวนี้จะมีผลกับตารางใน Sheet)")) return;
        fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', type: type, id: id }) })
        .then(res => res.json()).then(res => { if(res.isOk) { alert("ลบข้อมูลสำเร็จ!"); loadAllData(); } else { alert("ไม่สามารถลบได้"); } });
    }

    window.onload = loadAllData;
</script>
</body>
</html>
