<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบส่งงานนักเรียน - โรงเรียนจอมสุรางค์อุปถัมภ์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-top: 5px solid #0056b3; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .logo-img { max-height: 100px; display: block; margin: 0 auto 15px; }
        .loading-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction:column; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h5 id="loadingText">กำลังประมวลผลและส่งงาน กรุณาอย่าปิดหน้าต่างนี้...</h5>
</div>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card p-4">
                <img src="ตราประจำโรงเรียนจอมสุรางค์อุปถัมภ์.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                <h4 class="text-center text-primary mb-4">ระบบส่งงานออนไลน์</h4>
                
                <form id="submissionForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">1. เลือก ระดับชั้น/ห้องเรียน</label>
                        <select class="form-select" id="classroom" required>
                            <option value="">-- เลือกห้องเรียน --</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">2. เลือก ชื่อ-นามสกุล ของนักเรียน</label>
                        <select class="form-select" id="studentName" required disabled>
                            <option value="">-- กรุณาเลือกห้องเรียนก่อน --</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">3. เลขที่</label>
                        <input type="text" class="form-select" id="studentNumber" readonly placeholder="ระบบจะกรอกเลขให้อัตโนมัติ">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">4. เลือก ชิ้นงาน/ภาระงาน</label>
                        <select class="form-select" id="assignment" required>
                            <option value="">-- เลือกชิ้นงาน --</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">5. ลิงก์ผลงาน (ถ้ามี เช่น ลิงก์ Canva/YouTube)</label>
                        <input type="url" class="form-control" id="workLink" placeholder="https://...">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">6. แนบไฟล์ภาพ หรือ ไฟล์งาน (ระบบจะย่อขนาดให้อัตโนมัติ)</label>
                        <input type="file" class="form-control" id="fileInput" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx">
                        <small class="text-muted" id="compressStatus"></small>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold" id="submitBtn">📤 กดส่งงานบันทึกข้อมูล</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ ครูนำ URL Web App ล่าสุดมาใส่ที่นี่
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyrGfnkhLu9vYgOy67Tj4UWk1eDryHZI1mLzxGwT880fwK-1oLdnDRH8K4csT229SAa/exec';
    
    let allStudents = [];
    let compressedFileData = '';
    let compressedFileName = '';

    // โหลดข้อมูลเริ่มต้นดึงแบบความเร็วสูง (?type=init)
    window.addEventListener('DOMContentLoaded', () => {
        showLoading("กำลังโหลดรายชื่อและภาระงาน...");
        fetch(`${WEB_APP_URL}?type=init`)
            .then(res => res.json())
            .then(data => {
                hideLoading();
                const assignmentSelect = document.getElementById('assignment');
                const classroomSelect = document.getElementById('classroom');
                
                const classrooms = new Set();
                
                data.forEach(item => {
                    if (item.type === 'assignment') {
                        let opt = document.createElement('option');
                        opt.value = item.name;
                        opt.textContent = item.name;
                        assignmentSelect.appendChild(opt);
                    } else if (item.type === 'student') {
                        allStudents.push(item);
                        classrooms.add(item.classroom);
                    }
                });

                Array.from(classrooms).sort().forEach(cls => {
                    let opt = document.createElement('option');
                    opt.value = cls;
                    opt.textContent = cls;
                    classroomSelect.appendChild(opt);
                });
            }).catch(err => { hideLoading(); alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบฐานข้อมูล"); });
    });

    // เลือกห้องเรียนแล้วกรองชื่อ
    document.getElementById('classroom').addEventListener('change', function() {
        const cls = this.value;
        const studentSelect = document.getElementById('studentName');
        studentSelect.innerHTML = '<option value="">-- เลือกชื่อ-นามสกุล --</option>';
        document.getElementById('studentNumber').value = '';
        
        if(!cls) { studentSelect.disabled = true; return; }
        
        const filtered = allStudents.filter(s => s.classroom === cls)
                                    .sort((a,b) => a.name.localeCompare(b.name, 'th'));
        
        filtered.forEach((std, index) => {
            let opt = document.createElement('option');
            opt.value = std.name;
            opt.textContent = std.name;
            opt.dataset.num = index + 1; 
            studentSelect.appendChild(opt);
        });
        studentSelect.disabled = false;
    });

    // ดึงเลขที่อัตโนมัติเมื่อเลือกชื่อ
    document.getElementById('studentName').addEventListener('change', function() {
        const opt = this.options[this.selectedIndex];
        document.getElementById('studentNumber').value = opt.dataset.num || '';
    });

    // 💡 ระบบบีบอัดรูปภาพอัจฉริยะฝั่งนักเรียน ป้องกันระบบหนาแน่นถาวร
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.target || this.files[0];
        if(!file) return;
        
        const statusEl = document.getElementById('compressStatus');
        
        if (file.type.match('image.*')) {
            statusEl.textContent = "กำลังบีบอัดรูปภาพให้เหมาะสมกับระบบ...";
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200;
                    let width = img.width;
                    let height = img.height;

                    if (width > height && width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    else if (height > MAX_WIDTH) { width *= MAX_WIDTH / height; height = MAX_WIDTH; }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    compressedFileData = canvas.toDataURL('image/jpeg', 0.75); // บีบอัดเหลือ 75% ชัดเจนแต่ไฟล์เล็กลง 10 เท่า
                    compressedFileName = file.name.substring(0, file.name.lastIndexOf('.')) + '.jpg';
                    statusEl.textContent = "⚡ บีบอัดรูปภาพเสร็จสิ้น! ไฟล์พร้อมส่งความเร็วสูง";
                    statusEl.className = "text-success";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        } else {
            // ไฟล์ประเภทอื่นๆ ที่ไม่ใช่รูปภาพ (เช่น PDF, Word) ให้ส่งแบบปกติ
            const reader = new FileReader();
            reader.onload = function(event) {
                compressedFileData = event.target.result;
                compressedFileName = file.name;
                statusEl.textContent = "ไฟล์เอกสารพร้อมส่ง";
                statusEl.className = "text-info";
            };
            reader.readAsDataURL(file);
        }
    });

    // ส่งข้อมูล
    document.getElementById('submissionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        showLoading("กำลังบันทึกข้อมูลลงตารางและส่งไฟล์... กรุณารอสักครู่");

        const now = new Date();
        const submittedDate = now.toLocaleDateString('th-TH') + ' ' + now.toLocaleTimeString('th-TH');

        const payload = {
            action: 'create',
            record: {
                type: 'submission',
                submitted_date: submittedDate,
                classroom: document.getElementById('classroom').value,
                student_number: document.getElementById('studentNumber').value,
                student_name: document.getElementById('studentName').value,
                assignment: document.getElementById('assignment').value,
                link: document.getElementById('workLink').value,
                file_data: compressedFileData,
                file_name: compressedFileName
            }
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(res => {
            hideLoading();
            if(res.isOk) {
                alert("🎉 ส่งงานสำเร็จเรียบร้อยแล้วค่ะ ข้อมูลถูกบันทึกแล้ว!");
                document.getElementById('submissionForm').reset();
                document.getElementById('studentName').disabled = true;
                document.getElementById('compressStatus').textContent = '';
                compressedFileData = ''; compressedFileName = '';
            } else {
                alert("❌ เกิดข้อผิดพลาด: " + (res.error || "ระบบหนาแน่น กรุณากดส่งใหม่อีกครั้ง"));
            }
        })
        .catch(err => { hideLoading(); alert("❌ ระบบคิวยังหนาแน่นอยู่ กรุณารอสักครู่แล้วกดส่งใหม่อีกครั้ง"); });
    });

    function showLoading(text) { document.getElementById('loadingText').textContent = text; document.getElementById('loading').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loading').style.style.display = 'none'; }
</script>
</body>
</html>
