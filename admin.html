<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบตรวจงานแอดมิน - ครูเกมส์</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { 
      overflow-x: hidden; 
      font-family: 'DM Sans', sans-serif; 
      -webkit-font-smoothing: antialiased; 
      scroll-behavior: smooth; 
    }
    .hw-card { 
      background: rgba(255,255,255,0.95); 
      border: 1px solid rgba(0,0,0,0.04); 
      border-radius: 20px; 
      box-shadow: 0 4px 20px rgba(30,64,175,0.05); 
    }
    .hw-input { 
      background: rgba(118,118,128,0.06); 
      border: 2px solid transparent; 
      border-radius: 12px; 
      padding: 12px 16px; 
      font-size: 15px; 
      width: 100%; 
      transition: all 0.3s; 
    }
    .hw-input:focus { 
      background: #ffffff; 
      border-color: #3b82f6; 
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.15); 
      outline: none; 
    }
    .btn-tactile { transition: all 0.2s; }
    .btn-tactile:active { transform: scale(0.96) translateY(2px); }
    .btn-tactile:hover { filter: brightness(1.05); }
    
    /* 🎯 ตกแต่งช่องรูปภาพแสดงผล และทำเอฟเฟกต์ขยายเมื่อเอาเมาส์ชี้ */
    .img-preview {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 12px;
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease;
        cursor: pointer;
        border: 2px solid #e5e7eb;
    }
    .img-preview:hover {
        transform: scale(3.5);
        z-index: 50;
        position: relative;
        box-shadow: 0 12px 20px -3px rgba(0, 0, 0, 0.3);
        border-color: #3b82f6;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
  </style>
</head>
<body class="min-h-screen bg-[#E6F2FB] text-gray-800 pb-10">
  
  <header class="pt-8 pb-6 px-5 max-w-7xl mx-auto flex flex-col items-center text-center gap-0 relative z-10">
    <img src="เกมส์_01.png" alt="โลโก้ครูเกมส์" class="w-32 h-32 object-cover drop-shadow-md mb-2" onerror="this.style.display='none'">
    <h1 class="font-bold text-3xl leading-tight text-gray-900 drop-shadow-sm mb-1">ตรวจงานครูเกมส์</h1>
    <p class="text-sm mt-1 text-white bg-blue-800 px-5 py-1.5 rounded-full inline-block font-semibold shadow-md">แผงควบคุมแอดมิน (Admin Panel)</p>
  </header>

  <main class="max-w-7xl mx-auto px-5 space-y-6">
    
    <div class="hw-card p-6 relative z-20">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
        <div>
          <label class="block text-sm font-bold mb-2 text-gray-600 uppercase">เลือกระดับชั้น / ห้อง</label>
          <select id="selectClass" class="hw-input" onchange="updateAssignmentDropdown()">
            <option value="">-- กำลังโหลดข้อมูล... --</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-gray-600 uppercase">เลือกชิ้นงาน</label>
          <select id="selectAssignment" class="hw-input" disabled>
            <option value="">-- เลือกห้องก่อน --</option>
          </select>
        </div>
        <div>
          <button id="fetchBtn" onclick="loadAdminTable()" class="btn-tactile w-full bg-blue-700 text-white font-bold text-lg p-3 rounded-xl shadow-md disabled:bg-gray-400">
            🔍 ดึงตารางตรวจงาน
          </button>
        </div>
      </div>
    </div>

    <div id="tableContainer" class="hw-card overflow-hidden hidden transition-all duration-500">
      <div class="overflow-x-auto w-full p-2">
        <table class="w-full text-left border-collapse min-w-[800px]">
          <thead>
            <tr class="bg-gray-100 text-gray-700 text-sm uppercase tracking-wide border-b-2 border-gray-200">
              <th class="py-4 px-4 font-bold w-[10%] text-center">เลขที่</th>
              <th class="py-4 px-4 font-bold w-[30%]">ชื่อ - นามสกุล</th>
              <th class="py-4 px-4 font-bold w-[15%] text-center">สถานะ</th>
              <th class="py-4 px-4 font-bold w-[20%] text-center">รูปผลงาน</th>
              <th class="py-4 px-4 font-bold w-[25%]">บันทึกคะแนน</th>
            </tr>
          </thead>
          <tbody id="studentTableBody" class="divide-y divide-gray-100 text-base">
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 bg-gray-900/95 backdrop-blur-sm text-white px-6 py-3.5 rounded-2xl shadow-2xl hidden text-sm font-medium z-50 text-center max-w-[90%] w-max transition-all duration-300 border border-gray-800"></div>

  <script>
    // 🔗 ตรวจสอบ URL Web App ของคุณครูให้เรียบร้อยนะครับ
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbygfNucbEhVTfRP5zuYW05sw3M4-L_RvwtvJEGCyPsVBTKq3tFGZg71p-W0rwrpD9uikA/exec';
    
    let globalData = [];

    window.onload = async function() {
      try {
        const response = await fetch(`${SCRIPT_URL}?type=init`);
        globalData = await response.json();
        
        const classrooms = [...new Set(globalData.filter(d => d.type === 'student').map(d => d.classroom))].sort();
        const selectClass = document.getElementById('selectClass');
        selectClass.innerHTML = '<option value="">-- เลือกห้องเรียน --</option>';
        classrooms.forEach(c => selectClass.add(new Option(c, c)));
      } catch (e) {
        showToast('❌ ไม่สามารถเชื่อมต่อฐานข้อมูลได้');
      }
    };

    function updateAssignmentDropdown() {
      const selectedClass = document.getElementById('selectClass').value;
      const selectAssignment = document.getElementById('selectAssignment');
      
      if (!selectedClass) {
        selectAssignment.innerHTML = '<option value="">-- เลือกห้องก่อน --</option>';
        selectAssignment.disabled = true;
        document.getElementById('tableContainer').classList.add('hidden');
        return;
      }
      
      const assignments = globalData.filter(d => d.type === 'assignment' && d.classroom === selectedClass && d.status !== '-');
      selectAssignment.innerHTML = '<option value="">-- เลือกชิ้นงาน --</option>';
      assignments.forEach(a => selectAssignment.add(new Option(a.name, a.name)));
      selectAssignment.disabled = false;
      document.getElementById('tableContainer').classList.add('hidden');
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg; 
      t.style.backgroundColor = isError ? "rgba(220, 38, 38, 0.95)" : "rgba(17, 24, 39, 0.95)";
      t.classList.remove('hidden');
      void t.offsetWidth; 
      t.style.opacity = '1';
      t.style.transform = 'translate(-50%, 0) scale(1)';
      setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translate(-50%, -10px) scale(0.95)';
        setTimeout(() => t.classList.add('hidden'), 300);
      }, 3000);
    }

    function getDirectImgUrl(driveUrl) {
      if (!driveUrl || driveUrl === '-' || driveUrl.trim() === '') return '';
      const match = driveUrl.match(/[-\w]{25,}/);
      if (match) {
        const fileId = match[0];
        return `https://drive.google.com/uc?export=view&id=${fileId}`;
      }
      return driveUrl; 
    }

    // 🚀 เพิ่มประสิทธิภาพสูงสุด: ใช้ loading="lazy" ช่วยให้หน้าเว็บเด้งขึ้นมาทันที ไม่ค้างรอโหลดรูปภาพพร้อมกันคราวละมากๆ
    async function loadAdminTable() {
      const classroom = document.getElementById('selectClass').value;
      const assignment = document.getElementById('selectAssignment').value;
      
      if (!classroom || !assignment) {
        showToast('❌ กรุณาเลือกห้องและชิ้นงานให้ครบถ้วน', true);
        return;
      }

      const tbody = document.getElementById('studentTableBody');
      const tableContainer = document.getElementById('tableContainer');
      const fetchBtn = document.getElementById('fetchBtn');

      fetchBtn.disabled = true;
      fetchBtn.innerText = '⏳ กำลังดึงข้อมูล...';
      tableContainer.classList.remove('hidden');
      tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-gray-500 font-medium animate-pulse text-lg">กำลังโหลดข้อมูลนักเรียนห้อง ${classroom}...</td></tr>`;

      try {
        const response = await fetch(`${SCRIPT_URL}?action=getAdminView&classroom=${encodeURIComponent(classroom)}&assignment=${encodeURIComponent(assignment)}`);
        const result = await response.json();

        if(result.isOk) {
          tbody.innerHTML = '';
          result.data.forEach(std => {
            let imgHTML = '<span class="text-gray-400 text-sm">ไม่มีรูป</span>';
            let statusBadge = '<span class="bg-red-100 text-red-600 px-3 py-1.5 rounded-full text-xs font-bold border border-red-200">ยังไม่ส่ง</span>';
            
            if (std.isSubmitted) {
              statusBadge = `
                <div class="flex flex-col items-center gap-1.5">
                  <span class="bg-green-100 text-green-700 px-3 py-1.5 rounded-full text-xs font-bold border border-green-200">ส่งแล้ว</span>
                  <span class="text-[11px] text-gray-500 font-mono">${std.submittedDate}</span>
                </div>`;
              
              const directImgUrl = getDirectImgUrl(std.fileUrl);
              
              if(directImgUrl) {
                // 🎯 บังคับทำเป็นแท็ก <img> พร้อมระบุ loading="lazy" ภาพจะโหลดเมื่อคุณครูเลื่อนเจอเท่านั้น
                imgHTML = `
                  <a href="${std.fileUrl}" target="_blank" class="flex justify-center">
                    <img src="${directImgUrl}" loading="lazy" class="img-preview shadow-sm" title="คลิกเพื่อเปิดดูขนาดเต็ม" onerror="this.onerror=null; this.outerHTML='<a href=&quot;${std.fileUrl}&quot; target=&quot;_blank&quot; class=&quot;text-blue-600 underline text-sm font-semibold hover:text-blue-800&quot;>เปิดดูรูปผลงาน</a>';">
                  </a>`;
              }
            }

            const row = `
              <tr class="hover:bg-blue-50/40 transition-colors">
                <td class="py-4 px-4 text-center font-bold text-gray-700 text-lg">${std.number}</td>
                <td class="py-4 px-4 font-semibold text-gray-800">${std.name}</td>
                <td class="py-4 px-4 text-center">${statusBadge}</td>
                <td class="py-4 px-4 text-center">${imgHTML}</td>
                <td class="py-4 px-4">
                  <div class="flex items-center justify-start gap-2">
                    <input type="number" id="score_${std.number}" class="hw-input py-2.5 px-3 w-24 text-center font-bold text-blue-700 text-lg border-2 border-gray-200" value="${std.score}" placeholder="-">
                    <button onclick="saveScore('${classroom}', '${std.number}', '${std.name}', '${assignment}')" class="btn-tactile bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl text-sm font-bold shadow-sm">
                      บันทึก
                    </button>
                  </div>
                </td>
              </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', row);
          });
          showToast(`✅ โหลดข้อมูลสำเร็จแล้วครับ!`);
        }
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-red-500 font-bold text-lg">❌ เกิดข้อผิดพลาด กรุณารีเฟรช</td></tr>`;
      } finally {
        fetchBtn.disabled = false;
        fetchBtn.innerText = '🔍 ดึงตารางตรวจงาน';
      }
    }

    async function saveScore(classroom, number, name, assignment) {
      const scoreInput = document.getElementById(`score_${number}`);
      const btn = scoreInput.nextElementSibling;
      const score = scoreInput.value;
      
      const originalText = btn.innerText;
      btn.innerText = '⏳...';
      btn.disabled = true;

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateScore', classroom: classroom, number: number, name: name, assignment: assignment, score: score })
        });
        
        const result = await response.json();
        if(result.isOk) {
          showToast(`🎉 บันทึกคะแนนเลขที่ ${number} สำเร็จ!`);
          btn.classList.replace('bg-blue-600', 'bg-green-600');
          btn.innerText = '✔ สำเร็จ';
          setTimeout(() => {
            btn.classList.replace('bg-green-600', 'bg-blue-600');
            btn.innerText = originalText;
            btn.disabled = false;
          }, 1500);
        } else {
          showToast('❌ บันทึกไม่สำเร็จ: ' + result.error, true);
          btn.innerText = originalText; btn.disabled = false;
        }
      } catch (e) {
        showToast('❌ การเชื่อมต่อล้มเหลว', true);
        btn.innerText = originalText; btn.disabled = false;
      }
    }
  </script>
</body>
</html>
